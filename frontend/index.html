<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Семейный менеджер - Вход</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h2>Семейный менеджер</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn">Войти</button>
            </form>
            <p style="text-align: center; margin-top: 20px;">
                Нет аккаунта? <a href="#" onclick="showRegister()">Зарегистрироваться</a>
            </p>
        </div>
    </div>

    <div id="registerModal" style="display: none;">
        <div class="login-box" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000;">
            <h2>Регистрация</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label>Имя пользователя</label>
                    <input type="text" id="regUsername" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="regPassword" required>
                </div>
                <div class="form-group">
                    <label>Код семьи (если есть)</label>
                    <input type="text" id="familyCode">
                </div>
                <button type="submit" class="btn">Зарегистрироваться</button>
                <button type="button" class="btn" onclick="hideRegister()" style="margin-top: 10px;">Отмена</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
